<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 50px;
        }

        p {
            font-size: 20px;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: white;
            color: #333;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background: #ddd;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome Bhai 😄</h1>
        <p>This is your Django Home Page 🚀</p>

        <button class="btn" onclick="alert('Django chal raha hai bhai! 🔥')">
            Click Me
        </button>
    </div>

</body>
</html>
