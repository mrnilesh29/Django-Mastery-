{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Profile App</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            color: white;
            padding: 20px;
        }

        .container {
            width: 400px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #00c6ff;
        }

        .card {
            width: 300px;
            margin: 20px auto;
            padding: 15px;
            background: white;
            border-radius: 10px;
            text-align: center;
        }

        img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }
    </style>
</head>

<body>

<h1>🚀 Profile System</h1>

{% if messages %}
  {% for message in messages %}
    <p style="text-align:center; color: white;">{{ message }}</p>
  {% endfor %}
{% endif %}

{% block content %}
{% endblock %}

</body>
</html>
