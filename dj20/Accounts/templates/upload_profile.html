{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2>Upload Profile</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Upload</button>
    </form>

    <br>
    <a href="{% url 'view_profile' %}">View Profiles</a>
</div>
{% endblock %}
