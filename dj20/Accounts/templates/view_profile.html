{% extends 'base.html' %}

{% block content %}

<h2 style="text-align:center; color:white;">All Profiles</h2>

{% for p in profile %}
<div class="card">

    {% if p.image %}
        <img src="{{ p.image.url }}">
    {% endif %}

    <h3>{{ p.name }}</h3>
    <p>{{ p.email }}</p>
    <p>{{ p.city }}</p>

</div>
{% endfor %}

<a style="display:block; text-align:center; color:white;" href="{% url 'upload' %}">
    Upload New Profile
</a>

{% endblock %}
