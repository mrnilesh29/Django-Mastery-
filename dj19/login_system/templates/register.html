{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2>Register</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create Account</button>
    </form>

    <a href="{% url 'login' %}">Already have account?</a>
</div>
{% endblock %}
