{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Email">
        <input type="password" name="password" placeholder="Password">
        <button type="submit">Login</button>
    </form>

    <a href="{% url 'register' %}">Create Account</a>
</div>
{% endblock %}
