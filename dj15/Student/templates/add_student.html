<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }
        .container {
            width: 350px;
            margin: 80px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Add Student</h2>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}   <!-- 🔥 ModelForm auto fields -->

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
