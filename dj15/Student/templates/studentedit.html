<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }
        .container {
            width: 350px;
            margin: 80px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background: orange;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background: darkorange;
        }
        .error {
            color: red;
            font-size: 14px;
        }
        .back {
            text-align: center;
            margin-top: 10px;
        }
        .back a {
            text-decoration: none;
            color: blue;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Edit Student</h2>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}   <!-- 🔥 pre-filled data -->

        <!-- 🔥 Error Messages -->
        {% for field in form %}
            {% for error in field.errors %}
                <p class="error">{{ error }}</p>
            {% endfor %}
        {% endfor %}

        <button type="submit">Update Student</button>
    </form>

    <div class="back">
        <a href="{% url 'studentlist' %}">⬅ Back to Student List</a>
    </div>
</div>

</body>
</html>
