<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Exam Portal{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f172a;
            color: #e5e7eb;
        }

        /* Navbar */
        .navbar {
            background-color: #020617;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #facc15;
        }

        .logo {
            color: #facc15;
            font-size: 22px;
            font-weight: bold;
        }

        .nav-links a {
            color: #e5e7eb;
            text-decoration: none;
            margin-left: 20px;
        }

        .nav-links a:hover {
            color: #facc15;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            height: 100vh;
            background-color: #020617;
            position: fixed;
            top: 60px;
            left: 0;
            padding-top: 20px;
            border-right: 2px solid #facc15;
        }

        .sidebar a {
            display: block;
            color: #e5e7eb;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #facc15;
            color: #020617;
        }

        /* Content */
        .content {
            margin-left: 240px;
            padding: 30px;
        }

        /* Cards */
        .card {
            background-color: #020617;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #facc15;
        }

        /* Button */
        .btn {
            background-color: #facc15;
            color: #020617;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #eab308;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">Exam Portal 🎓</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="#">Tests</a>
            <a href="#">Results</a>
            <a href="#">Logout</a>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <a href="#">Dashboard</a>
        <a href="#">Create Test</a>
        <a href="#">My Exams</a>
        <a href="#">Performance</a>
    </div>

    <!-- Main Content -->
    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
