<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>My Website</title>
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
 <h3>Store customers</h3>

{% if stores %}
    {% for store in stores %}
        <p>{{ store.name }} - {{ store.owner }} - {{ store.stable }}</p>
    {% endfor %}
{% endif %}

    <header>
        <h1>Welcome to My Website 🚀</h1>
        <p>HTML + CSS + JS Combo</p>
    </header>

    <section class="container">
        <h2>Click the Button 👇</h2>
        <button onclick="changeText()">Click Me</button>
        <p id="message">Hello User 👋</p>
    </section>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
